<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="8" y="8" width="1184" height="614" rx="12" fill="none" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Grid dots background -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1e1e1e"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- SC monogram -->
  <rect x="460" y="120" width="280" height="160" rx="16" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="600" y="228" font-family="monospace, 'Courier New'" font-size="96" font-weight="bold" fill="#00ff88" text-anchor="middle">SC</text>

  <!-- Name -->
  <text x="600" y="360" font-family="monospace, 'Courier New'" font-size="48" font-weight="bold" fill="#e8e8e8" text-anchor="middle">Sertaç Can</text>

  <!-- Role -->
  <text x="600" y="415" font-family="'Inter', sans-serif" font-size="28" fill="#666666" text-anchor="middle">Software Developer</text>

  <!-- URL -->
  <text x="600" y="530" font-family="monospace, 'Courier New'" font-size="20" fill="#00ff8866" text-anchor="middle">sertaccan.com</text>

  <!-- Accent line -->
  <rect x="500" y="450" width="200" height="2" rx="1" fill="#00ff8833"/>
</svg>
